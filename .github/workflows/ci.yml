name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]   # feature branches run via their PR (synchronize) — avoids double runs

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Enforce 200-line file cap (CLAUDE.md rule 1)
        run: ./scripts/check-file-length.sh

      - name: Build, test, coverage gate, lint
        run: ./gradlew buildSmoke --no-daemon
