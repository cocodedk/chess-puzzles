name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]   # feature branches run via their PR (synchronize) — avoids double runs

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Enforce 200-line file cap (CLAUDE.md rule 1)
        run: ./scripts/check-file-length.sh

      - name: Build, test, coverage gate, lint
        run: ./gradlew buildSmoke --no-daemon
